modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId          = "${mod_id}"
version        = "${mod_version}"
displayName    = "${mod_name}"
description    = """${mod_description}"""

[[dependencies.chaos_addon]]
    modId       = "neoforge"
    type        = "required"
    versionRange = "${neo_version_range}"
    ordering    = "NONE"
    side        = "BOTH"

[[dependencies.chaos_addon]]
    modId       = "minecraft"
    type        = "required"
    versionRange = "${minecraft_version_range}"
    ordering    = "NONE"
    side        = "BOTH"

[[dependencies.chaos_addon]]
    modId       = "origins"
    type        = "required"
    versionRange = "[0.1-alpha.2,)"
    ordering    = "AFTER"
    side        = "BOTH"

[[dependencies.chaos_addon]]
    modId       = "pehkui"
    type        = "required"
    versionRange = "[3.8.3,)"
    ordering    = "AFTER"
    side        = "BOTH"

[[dependencies.chaos_addon]]
    modId       = "geckolib"
    type        = "required"
    versionRange = "[4.4,)"
    ordering    = "AFTER"
    side        = "BOTH"

[[dependencies.chaos_addon]]
    modId       = "bookshelf"
    type        = "required"
    versionRange = "[21.1,)"
    ordering    = "AFTER"
    side        = "BOTH"

[[dependencies.chaos_addon]]
    modId       = "cloth_config"
    type        = "optional"
    versionRange = "[15.0,)"
    ordering    = "NONE"
    side        = "CLIENT"

